{% extends 'base.html' %}
{% load static %}

{% block title %}Bản đồ căn hộ — AlphaHome{% endblock %}
{% block active_map %}active{% endblock %}

{% block extra_head %}
<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
<style>
    #map { height: 600px; width: 100%; border-radius: 12px; z-index: 1; }
    .leaflet-popup-content-wrapper { border-radius: 8px; }
    .leaflet-popup-content { margin: 12px; }
</style>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 style="font-family:'Nunito',sans-serif;font-size:22px;font-weight:900;margin:0;">
        <i class="fa-solid fa-map-location-dot me-2" style="color:var(--honey-primary);"></i>
        Bản đồ vị trí các căn hộ
    </h1>
</div>

<div class="ah-panel">
    <div id="map"></div>
</div>
{% endblock %}

{% block extra_js %}
<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

<script>
    // Khởi tạo bản đồ, trung tâm là TP.HCM
    var map = L.map('map').setView([10.7769, 106.7009], 11);

    // Thêm tile layer (bản đồ nền)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    // Dữ liệu bản đồ từ backend
    var rooms = {{ map_data_json|safe }};
    
    // Thêm markers
    rooms.forEach(function(room) {
        var marker = L.marker([room.lat, room.lng]).addTo(map);
        
        var imgHtml = room.anh_url ? `<img src="${room.anh_url}" style="width:100%; height:120px; object-fit:cover; border-radius:4px; margin-bottom:8px;">` : '';
        
        var popupContent = `
            <div style="min-width: 180px;">
                ${imgHtml}
                <h6 style="font-weight: 700; margin-bottom: 5px; font-size: 14px;">${room.ten}</h6>
                <p style="margin-bottom: 5px; color: #dc3545; font-weight: 600;">${room.gia}</p>
                <p style="margin-bottom: 10px; font-size: 13px;">Trạng thái: <strong>${room.trang_thai}</strong></p>
                <a href="${room.url}" class="btn-honey d-block text-center py-1 text-decoration-none" style="font-size: 12px; border-radius: 4px;">Xem chi tiết</a>
            </div>
        `;
        
        marker.bindPopup(popupContent);
    });
</script>
{% endblock %}
